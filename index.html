<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertical Slice - Milestone 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Vertical Slice – Milestone 1 Prototype</h1>
    <p class="controls">
      <strong>Controls:</strong> A/D or ←/→ move, Space jump, E interact, R reset.
    </p>
    <canvas id="game" width="960" height="540" aria-label="2D platformer test levels"></canvas>
    <p id="status" class="status">Pull the first joystick to open Gate 1, then clear Level 2.</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
